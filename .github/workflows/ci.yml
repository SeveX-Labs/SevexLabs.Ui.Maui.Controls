name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: macos-26

    env:
      CI_MAUI_VERSION: 10.0.20
      ANDROID_RID: android-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Show installed Xcode versions
        run: |
          ls -1 /Applications | grep Xcode || true
          xcodebuild -version || true

      - name: Select Xcode 26.0
        run: |
          XCODE_PATH="$(ls -d /Applications/Xcode_26.0*.app 2>/dev/null | head -n 1)"

          if [ -z "$XCODE_PATH" ]; then
            echo "Xcode 26.0.x was not found."
            echo "Installed Xcode versions:"
            ls -1 /Applications | grep Xcode || true
            exit 1
          fi

          echo "Using Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install MAUI workloads
        run: dotnet workload install maui-android maui-ios --skip-manifest-update

      - name: Restore library
        run: dotnet restore SevexLabs.Ui.Maui.Controls/SevexLabs.Ui.Maui.Controls.csproj

      - name: Build Android library
        run: >
          dotnet build SevexLabs.Ui.Maui.Controls/SevexLabs.Ui.Maui.Controls.csproj
          -f net10.0-android
          -c Release
          --no-restore
          -m:1
          -v:n
          -p:UseSharedCompilation=false

      - name: Build iOS library
        run: >
          dotnet build SevexLabs.Ui.Maui.Controls/SevexLabs.Ui.Maui.Controls.csproj
          -f net10.0-ios
          -c Release
          --no-restore
          -m:1
          -v:n
          -p:UseSharedCompilation=false

      - name: Pack
        run: >
          dotnet pack SevexLabs.Ui.Maui.Controls/SevexLabs.Ui.Maui.Controls.csproj
          -c Release
          -o artifacts
          --no-build
          -p:ContinuousIntegrationBuild=true

      - name: Build Android sample
        run: >
          dotnet build SAMPLE/SevexLabsUiControls.SampleApp/SevexLabsUiControls.SampleApp.csproj
          -f net10.0-android36.0
          -c Release
          -m:1
          -v:n
          -p:UseSharedCompilation=false
          -p:UseAsProjectReference=true
          -p:OverrideAndroidSpecificVersion=36.0
          -p:MauiVersion=${{ env.CI_MAUI_VERSION }}
          -p:RuntimeIdentifier=${{ env.ANDROID_RID }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*